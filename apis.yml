  - name: MongoDB Atlas Data API
    description: The Atlas Data API lets you read and write data in MongoDB Atlas with standard HTTPS
      requests, without the need for a MongoDB driver.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
