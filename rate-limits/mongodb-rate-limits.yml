specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: MongoDB Atlas
providerId: mongodb
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Database
description: Atlas Admin API per-project rate limits; cluster connections by tier.
sources:
  - https://www.mongodb.com/pricing
  - https://www.mongodb.com/pricing/calculator
  - https://www.mongodb.com/docs/atlas/api/atlas-admin-api/
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Atlas Admin API (default)
    scope: project
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: M0 connections
    scope: cluster
    metric: concurrent_connections
    limit: 500
  - name: M10 connections
    scope: cluster
    metric: concurrent_connections
    limit: 1500
  - name: M30 connections
    scope: cluster
    metric: concurrent_connections
    limit: 3000
  - name: Serverless concurrent operations
    scope: instance
    metric: concurrent_ops
    limit: 1000
