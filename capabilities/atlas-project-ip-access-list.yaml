naftiko: 1.0.0-alpha2
info:
  label: MongoDB Atlas Administration API — Project IP Access List
  description: 'MongoDB Atlas Administration API — Project IP Access List. 5 operations. Lead operation: Return All Project
    IP Access List Entries. Self-contained Naftiko capability covering one Mongodb business surface.'
  tags:
  - Mongodb
  - Project IP Access List
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MONGODB_API_KEY: MONGODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: atlas-project-ip-access-list
    baseUri: https://cloud.mongodb.com
    description: MongoDB Atlas Administration API — Project IP Access List business capability. Self-contained, no shared
      references.
    resources:
    - name: api-atlas-v2-groups-groupId-accessList
      path: /api/atlas/v2/groups/{groupId}/accessList
      operations:
      - name: listgroupaccesslistentries
        method: GET
        description: Return All Project IP Access List Entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroupaccesslistentry
        method: POST
        description: Add Entries to Project IP Access List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-atlas-v2-groups-groupId-accessList-entryValue
      path: /api/atlas/v2/groups/{groupId}/accessList/{entryValue}
      operations:
      - name: deletegroupaccesslistentry
        method: DELETE
        description: Remove One Entry from One Project IP Access List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entryValue
          in: path
          type: string
          description: 'Access list entry that you want to remove from the project''s IP access list. This value can use one
            of the following: one AWS security group ID, one IP address,'
          required: true
      - name: getgroupaccesslistentry
        method: GET
        description: Return One Project IP Access List Entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entryValue
          in: path
          type: string
          description: 'Access list entry that you want to return from the project''s IP access list. This value can use one
            of the following: one AWS security group ID, one IP address,'
          required: true
    - name: api-atlas-v2-groups-groupId-accessList-entryValue-status
      path: /api/atlas/v2/groups/{groupId}/accessList/{entryValue}/status
      operations:
      - name: getgroupaccessliststatus
        method: GET
        description: Return Status of One Project IP Access List Entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entryValue
          in: path
          type: string
          description: Network address or cloud provider security construct that identifies which project access list entry
            to be verified.
          required: true
    authentication:
      type: bearer
      token: '{{env.MONGODB_API_KEY}}'
  exposes:
  - type: rest
    namespace: atlas-project-ip-access-list-rest
    port: 8080
    description: REST adapter for MongoDB Atlas Administration API — Project IP Access List. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
