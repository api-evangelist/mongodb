      name: api-atlas-v2-groups-groupid-accesslist
      description: REST surface for api-atlas-v2-groups-groupId-accessList.
      operations:
      - method: GET
        name: listgroupaccesslistentries
        description: Return All Project IP Access List Entries
        call: atlas-project-ip-access-list.listgroupaccesslistentries
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroupaccesslistentry
        description: Add Entries to Project IP Access List
        call: atlas-project-ip-access-list.creategroupaccesslistentry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/accesslist/{entryvalue}
      name: api-atlas-v2-groups-groupid-accesslist-entryvalue
      description: REST surface for api-atlas-v2-groups-groupId-accessList-entryValue.
      operations:
      - method: DELETE
        name: deletegroupaccesslistentry
        description: Remove One Entry from One Project IP Access List
        call: atlas-project-ip-access-list.deletegroupaccesslistentry
        with:
          entryValue: rest.entryValue
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getgroupaccesslistentry
        description: Return One Project IP Access List Entry
        call: atlas-project-ip-access-list.getgroupaccesslistentry
        with:
          entryValue: rest.entryValue
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/accesslist/{entryvalue}/status
      name: api-atlas-v2-groups-groupid-accesslist-entryvalue-status
      description: REST surface for api-atlas-v2-groups-groupId-accessList-entryValue-status.
      operations:
      - method: GET
        name: getgroupaccessliststatus
        description: Return Status of One Project IP Access List Entry
        call: atlas-project-ip-access-list.getgroupaccessliststatus
        with:
          entryValue: rest.entryValue
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: atlas-project-ip-access-list-mcp
    port: 9090
    transport: http
    description: MCP adapter for MongoDB Atlas Administration API — Project IP Access List. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
