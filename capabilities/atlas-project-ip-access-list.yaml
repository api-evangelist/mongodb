        readOnly: false
        destructive: false
        idempotent: false
      call: atlas-project-ip-access-list.creategroupaccesslistentry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-one-entry-one-project
      description: Remove One Entry from One Project IP Access List
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: atlas-project-ip-access-list.deletegroupaccesslistentry
      with:
        entryValue: tools.entryValue
      outputParameters:
      - type: object
        mapping: $.
    - name: return-one-project-ip-access
      description: Return One Project IP Access List Entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-project-ip-access-list.getgroupaccesslistentry
      with:
        entryValue: tools.entryValue
      outputParameters:
      - type: object
        mapping: $.
    - name: return-status-one-project-ip
      description: Return Status of One Project IP Access List Entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-project-ip-access-list.getgroupaccessliststatus
      with:
        entryValue: tools.entryValue
      outputParameters:
      - type: object
        mapping: $.
