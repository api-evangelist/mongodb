naftiko: 1.0.0-alpha2
info:
  label: MongoDB Atlas Administration API — Auditing
  description: 'MongoDB Atlas Administration API — Auditing. 2 operations. Lead operation: Return Auditing Configuration for
    One Project. Self-contained Naftiko capability covering one Mongodb business surface.'
  tags:
  - Mongodb
  - Auditing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MONGODB_API_KEY: MONGODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: atlas-auditing
    baseUri: https://cloud.mongodb.com
    description: MongoDB Atlas Administration API — Auditing business capability. Self-contained, no shared references.
    resources:
    - name: api-atlas-v2-groups-groupId-auditLog
      path: /api/atlas/v2/groups/{groupId}/auditLog
      operations:
      - name: getgroupauditlog
        method: GET
        description: Return Auditing Configuration for One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategroupauditlog
        method: PATCH
        description: Update Auditing Configuration for One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MONGODB_API_KEY}}'
  exposes:
  - type: rest
    namespace: atlas-auditing-rest
    port: 8080
    description: REST adapter for MongoDB Atlas Administration API — Auditing. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/atlas/v2/groups/{groupid}/auditlog
      name: api-atlas-v2-groups-groupid-auditlog
      description: REST surface for api-atlas-v2-groups-groupId-auditLog.
      operations:
      - method: GET
        name: getgroupauditlog
        description: Return Auditing Configuration for One Project
        call: atlas-auditing.getgroupauditlog
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updategroupauditlog
        description: Update Auditing Configuration for One Project
        call: atlas-auditing.updategroupauditlog
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: atlas-auditing-mcp
    port: 9090
    transport: http
    description: MCP adapter for MongoDB Atlas Administration API — Auditing. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: return-auditing-configuration-one-project
      description: Return Auditing Configuration for One Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-auditing.getgroupauditlog
      outputParameters:
      - type: object
        mapping: $.
    - name: update-auditing-configuration-one-project
      description: Update Auditing Configuration for One Project
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: atlas-auditing.updategroupauditlog
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
