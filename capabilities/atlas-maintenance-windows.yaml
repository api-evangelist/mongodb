        description: Reset One Maintenance Window for One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getgroupmaintenancewindow
        method: GET
        description: Return One Maintenance Window for One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
