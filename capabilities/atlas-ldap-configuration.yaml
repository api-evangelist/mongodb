naftiko: 1.0.0-alpha2
info:
  label: MongoDB Atlas Administration API — LDAP Configuration
  description: 'MongoDB Atlas Administration API — LDAP Configuration. 5 operations. Lead operation: Return LDAP or X.509
    Configuration. Self-contained Naftiko capability covering one Mongodb business surface.'
  tags:
  - Mongodb
  - LDAP Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MONGODB_API_KEY: MONGODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: atlas-ldap-configuration
    baseUri: https://cloud.mongodb.com
    description: MongoDB Atlas Administration API — LDAP Configuration business capability. Self-contained, no shared references.
    resources:
    - name: api-atlas-v2-groups-groupId-userSecurity
      path: /api/atlas/v2/groups/{groupId}/userSecurity
      operations:
      - name: getgroupusersecurity
        method: GET
        description: Return LDAP or X.509 Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategroupusersecurity
        method: PATCH
        description: Update LDAP or X.509 Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-atlas-v2-groups-groupId-userSecurity-ldap-userToDNMapping
      path: /api/atlas/v2/groups/{groupId}/userSecurity/ldap/userToDNMapping
      operations:
      - name: deletegroupusersecurityldapusertodnmapping
        method: DELETE
        description: Remove LDAP User to DN Mapping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-atlas-v2-groups-groupId-userSecurity-ldap-verify
      path: /api/atlas/v2/groups/{groupId}/userSecurity/ldap/verify
      operations:
      - name: verifygroupusersecurityldap
        method: POST
        description: Verify LDAP Configuration in One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-atlas-v2-groups-groupId-userSecurity-ldap-verify-requestId
      path: /api/atlas/v2/groups/{groupId}/userSecurity/ldap/verify/{requestId}
      operations:
      - name: getgroupusersecurityldapverify
        method: GET
        description: Return Status of LDAP Configuration Verification in One Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: requestId
          in: path
          type: string
          description: Unique string that identifies the request to verify an Lightweight Directory Access Protocol (LDAP)
            configuration.
          required: true
    authentication:
      type: bearer
      token: '{{env.MONGODB_API_KEY}}'
  exposes:
  - type: rest
    namespace: atlas-ldap-configuration-rest
    port: 8080
    description: REST adapter for MongoDB Atlas Administration API — LDAP Configuration. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/atlas/v2/groups/{groupid}/usersecurity
      name: api-atlas-v2-groups-groupid-usersecurity
      description: REST surface for api-atlas-v2-groups-groupId-userSecurity.
      operations:
      - method: GET
        name: getgroupusersecurity
        description: Return LDAP or X.509 Configuration
        call: atlas-ldap-configuration.getgroupusersecurity
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updategroupusersecurity
        description: Update LDAP or X.509 Configuration
        call: atlas-ldap-configuration.updategroupusersecurity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/usersecurity/ldap/usertodnmapping
      name: api-atlas-v2-groups-groupid-usersecurity-ldap-usertodnmapping
      description: REST surface for api-atlas-v2-groups-groupId-userSecurity-ldap-userToDNMapping.
      operations:
      - method: DELETE
        name: deletegroupusersecurityldapusertodnmapping
        description: Remove LDAP User to DN Mapping
        call: atlas-ldap-configuration.deletegroupusersecurityldapusertodnmapping
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/usersecurity/ldap/verify
      name: api-atlas-v2-groups-groupid-usersecurity-ldap-verify
      description: REST surface for api-atlas-v2-groups-groupId-userSecurity-ldap-verify.
      operations:
      - method: POST
        name: verifygroupusersecurityldap
        description: Verify LDAP Configuration in One Project
        call: atlas-ldap-configuration.verifygroupusersecurityldap
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/usersecurity/ldap/verify/{requestid}
      name: api-atlas-v2-groups-groupid-usersecurity-ldap-verify-requestid
      description: REST surface for api-atlas-v2-groups-groupId-userSecurity-ldap-verify-requestId.
      operations:
      - method: GET
        name: getgroupusersecurityldapverify
        description: Return Status of LDAP Configuration Verification in One Project
        call: atlas-ldap-configuration.getgroupusersecurityldapverify
        with:
          requestId: rest.requestId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: atlas-ldap-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for MongoDB Atlas Administration API — LDAP Configuration. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: return-ldap-x-509-configuration
      description: Return LDAP or X.509 Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-ldap-configuration.getgroupusersecurity
      outputParameters:
      - type: object
        mapping: $.
    - name: update-ldap-x-509-configuration
      description: Update LDAP or X.509 Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: atlas-ldap-configuration.updategroupusersecurity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-ldap-user-dn-mapping
      description: Remove LDAP User to DN Mapping
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: atlas-ldap-configuration.deletegroupusersecurityldapusertodnmapping
      outputParameters:
      - type: object
        mapping: $.
    - name: verify-ldap-configuration-one-project
      description: Verify LDAP Configuration in One Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: atlas-ldap-configuration.verifygroupusersecurityldap
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: return-status-ldap-configuration-verification
      description: Return Status of LDAP Configuration Verification in One Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-ldap-configuration.getgroupusersecurityldapverify
      with:
        requestId: tools.requestId
      outputParameters:
      - type: object
        mapping: $.
