naftiko: 1.0.0-alpha2
info:
  label: MongoDB Atlas Administration API — Cloud Provider Access
  description: 'MongoDB Atlas Administration API — Cloud Provider Access. 5 operations. Lead operation: Return All Cloud Provider
    Access Roles. Self-contained Naftiko capability covering one Mongodb business surface.'
  tags:
  - Mongodb
  - Cloud Provider Access
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MONGODB_API_KEY: MONGODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: atlas-cloud-provider-access
    baseUri: https://cloud.mongodb.com
    description: MongoDB Atlas Administration API — Cloud Provider Access business capability. Self-contained, no shared references.
    resources:
    - name: api-atlas-v2-groups-groupId-cloudProviderAccess
      path: /api/atlas/v2/groups/{groupId}/cloudProviderAccess
      operations:
      - name: listgroupcloudprovideraccess
        method: GET
        description: Return All Cloud Provider Access Roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroupcloudprovideraccess
        method: POST
        description: Create One Cloud Provider Access Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-atlas-v2-groups-groupId-cloudProviderAccess-cloudProvider-roleId
      path: /api/atlas/v2/groups/{groupId}/cloudProviderAccess/{cloudProvider}/{roleId}
      operations:
      - name: deauthorizegroupcloudprovideraccessrole
        method: DELETE
        description: Deauthorize One Cloud Provider Access Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cloudProvider
          in: path
          type: string
          description: Human-readable label that identifies the cloud provider of the role to deauthorize.
          required: true
        - name: roleId
          in: path
          type: string
          description: Unique 24-hexadecimal digit string that identifies the role.
          required: true
    - name: api-atlas-v2-groups-groupId-cloudProviderAccess-roleId
      path: /api/atlas/v2/groups/{groupId}/cloudProviderAccess/{roleId}
      operations:
      - name: getgroupcloudprovideraccess
        method: GET
        description: Return One Cloud Provider Access Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: roleId
          in: path
          type: string
          description: Unique 24-hexadecimal digit string that identifies the role.
          required: true
      - name: authorizegroupcloudprovideraccessrole
        method: PATCH
        description: Authorize One Cloud Provider Access Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: roleId
          in: path
          type: string
          description: Unique 24-hexadecimal digit string that identifies the role.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MONGODB_API_KEY}}'
  exposes:
  - type: rest
    namespace: atlas-cloud-provider-access-rest
    port: 8080
    description: REST adapter for MongoDB Atlas Administration API — Cloud Provider Access. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/atlas/v2/groups/{groupid}/cloudprovideraccess
      name: api-atlas-v2-groups-groupid-cloudprovideraccess
      description: REST surface for api-atlas-v2-groups-groupId-cloudProviderAccess.
      operations:
      - method: GET
        name: listgroupcloudprovideraccess
        description: Return All Cloud Provider Access Roles
        call: atlas-cloud-provider-access.listgroupcloudprovideraccess
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroupcloudprovideraccess
        description: Create One Cloud Provider Access Role
        call: atlas-cloud-provider-access.creategroupcloudprovideraccess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/cloudprovideraccess/{cloudprovider}/{roleid}
      name: api-atlas-v2-groups-groupid-cloudprovideraccess-cloudprovider-roleid
      description: REST surface for api-atlas-v2-groups-groupId-cloudProviderAccess-cloudProvider-roleId.
      operations:
      - method: DELETE
        name: deauthorizegroupcloudprovideraccessrole
        description: Deauthorize One Cloud Provider Access Role
        call: atlas-cloud-provider-access.deauthorizegroupcloudprovideraccessrole
        with:
          cloudProvider: rest.cloudProvider
          roleId: rest.roleId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/atlas/v2/groups/{groupid}/cloudprovideraccess/{roleid}
      name: api-atlas-v2-groups-groupid-cloudprovideraccess-roleid
      description: REST surface for api-atlas-v2-groups-groupId-cloudProviderAccess-roleId.
      operations:
      - method: GET
        name: getgroupcloudprovideraccess
        description: Return One Cloud Provider Access Role
        call: atlas-cloud-provider-access.getgroupcloudprovideraccess
        with:
          roleId: rest.roleId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: authorizegroupcloudprovideraccessrole
        description: Authorize One Cloud Provider Access Role
        call: atlas-cloud-provider-access.authorizegroupcloudprovideraccessrole
        with:
          roleId: rest.roleId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: atlas-cloud-provider-access-mcp
    port: 9090
    transport: http
    description: MCP adapter for MongoDB Atlas Administration API — Cloud Provider Access. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: return-all-cloud-provider-access
      description: Return All Cloud Provider Access Roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-cloud-provider-access.listgroupcloudprovideraccess
      outputParameters:
      - type: object
        mapping: $.
    - name: create-one-cloud-provider-access
      description: Create One Cloud Provider Access Role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: atlas-cloud-provider-access.creategroupcloudprovideraccess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deauthorize-one-cloud-provider-access
      description: Deauthorize One Cloud Provider Access Role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: atlas-cloud-provider-access.deauthorizegroupcloudprovideraccessrole
      with:
        cloudProvider: tools.cloudProvider
        roleId: tools.roleId
      outputParameters:
      - type: object
        mapping: $.
    - name: return-one-cloud-provider-access
      description: Return One Cloud Provider Access Role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlas-cloud-provider-access.getgroupcloudprovideraccess
      with:
        roleId: tools.roleId
      outputParameters:
      - type: object
        mapping: $.
    - name: authorize-one-cloud-provider-access
      description: Authorize One Cloud Provider Access Role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: atlas-cloud-provider-access.authorizegroupcloudprovideraccessrole
      with:
        roleId: tools.roleId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
